<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商职订单管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
padding: 20px 10px;
background:#f5f7fa;
font-family:Arial;
max-width: 100vw;
overflow-x: hidden;
}
.login{
max-width:400px;margin:50px auto;background:white;padding:30px;border-radius:10px;box-shadow:0 2px 10px #00000010;width: 90%;
}
.login input{
width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:5px;
}
.login button{
width:100%;padding:12px;background:#007bff;color:white;border:none;border-radius:5px;
}
.container{
display:none;max-width:none;width:98%;margin:0 auto;background:white;padding:20px 15px;border-radius:10px;box-shadow:0 2px 10px #00000010;
}
h1{margin-bottom:5px;text-align:center;font-size:20px;}
.status-desc {
text-align:left;font-size:14px;color:#333;margin-bottom:8px;padding-left:5px;line-height:1.6;
}
.color-tag {
display:inline-block;width:12px;height:12px;border-radius:2px;margin-right:5px;vertical-align:middle;
}
.tag-white { background:#fff; border:1px solid #ddd; }
.tag-blue { background:#e6f7ff; }
.tag-red { background:#fff2f0; }
.db-modify-desc {
text-align:left;font-size:13px;color:#666;margin-bottom:15px;padding-left:5px;line-height:1.5;
}
.search-tools{
display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap;align-items:center;
}
.search-tools input{
padding:8px 10px;border:1px solid #ddd;border-radius:5px;width:200px;
}
.search-tools button{
padding:8px 16px;background:#007bff;color:white;border:none;border-radius:5px;cursor:pointer;
}
.tools{
display:flex;gap:8px;margin-bottom:15px;align-items:center;justify-content:space-between;flex-wrap:wrap;
}
button{
padding:8px 16px;background:#007bff;color:white;border:none;border-radius:5px;cursor:pointer;
}
.refresh-amount-btn {
background:#28a745;padding:6px 10px;font-size:12px;margin-right:5px;
}
.modify-btn {
background:#ffc107;padding:6px 10px;font-size:12px;margin-right:5px;
}
button.del-btn{ background:#dc3545;padding:6px 10px;font-size:12px; }
button.exit-btn{background:#6c757d}
.table-container{ overflow-x:auto;margin:10px 0; }
table{ width:100%;min-width:1700px;border-collapse:collapse; }
th,td{
border:1px solid #ddd;padding:8px 6px;text-align:center;white-space:nowrap;font-size:13px;
}
th{background:#f8f9fa}
.id-col{width:80px}
.time-col{width:150px}
.name-col{width:80px}
.phone-col{width:110px}
.paytype-col{width:100px}
.pay-record-col{width:250px;}
.pay-screenshot-col{width:220px;}
.money-col{width:80px}
.oper-col{width:160px}
.class-col{width:120px}
.pay-record {
white-space:pre-line;text-align:left;padding:5px;line-height:1.4;
}
.pay-img-list { display:flex;flex-wrap:wrap;gap:4px;justify-content:center; }
.pay-img-item {
width:40px;height:40px;object-fit:cover;border-radius:4px;cursor:pointer;border:1px solid #ddd;
}
.row-modify { background-color:#fff2f0 !important }
.row-multi-submit { background-color:#e6f7ff !important }
.row-first-submit { background-color:#fff !important }

.modal {
position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;justify-content:center;align-items:center;z-index:9999;padding:15px;
}
.modal-content {
background:white;padding:30px;border-radius:12px;width:100%;max-width:900px;text-align:center;position:relative;max-height:95vh;overflow-y:auto;
}
.modal-img {
max-width:100%;max-height:85vh;object-fit:contain;border-radius:8px;
}
.modal-close {
position:fixed;top:20px;right:25px;font-size:36px;color:#fff;cursor:pointer;background:none;border:none;z-index:10000;
}
.modal-download {
margin-top:15px;padding:12px 24px;background:#28a745;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;
}
.modal-btn {
margin-top:20px;padding:14px 30px;background:#007bff;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;
}
#resultModal .modal-content {
max-width:550px;padding:40px 30px;
}
#modalTitle {font-size:20px;margin-bottom:10px}
#modalMsg {font-size:15px;line-height:1.7;margin:10px 0 20px}

.loading {
position: fixed;top: 50%;left: 50%;transform: translate(-50%, -50%);background: rgba(0,0,0,0.7);color: white;padding: 20px 40px;border-radius: 8px;font-size: 16px;z-index: 99999;display: none;
}
</style>
</head>

<body>
<div class="loading" id="loading">处理中...</div>
<div class="login" id="loginBox">
<h2>后台登录</h2>
<input type="password" id="pwd" placeholder="请输入管理密码">
<button onclick="login()">登录</button>
</div>

<div class="container" id="adminBox">
<h1>商职订单管理</h1>
<div class="status-desc">
<span class="color-tag tag-white"></span>白色：首次提交　
<span class="color-tag tag-blue"></span>蓝色：多次提交/追加　
<span class="color-tag tag-red"></span>红色：手动修改
</div>
<div class="db-modify-desc">
1. 数据库修改班次后已自动识别标红<br>2. 首次提交白色，追加/多次提交蓝色
</div>

<div class="search-tools">
<input type="text" id="searchName" placeholder="姓名查询">
<input type="text" id="searchPhone" placeholder="电话查询">
<button onclick="searchOrders()">查询</button>
<button onclick="resetSearch()">重置</button>
</div>

<div class="tools">
<div style="display:flex;gap:8px;">
<button onclick="load()">刷新</button>
<button onclick="exportExcel()">导出Excel</button>
</div>
<button class="exit-btn" onclick="logout()">退出</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th class="id-col">订单ID</th>
<th class="name-col">姓名</th>
<th class="phone-col">电话</th>
<th class="paytype-col">支付方式</th>
<th class="pay-record-col">支付记录</th>
<th class="pay-screenshot-col">付款信息</th>
<th class="money-col">总金额</th>
<th class="time-col">最后提交时间</th>
<th class="class-col">4月11日早送</th>
<th class="class-col">4月11日晚接</th>
<th class="class-col">4月12日早送</th>
<th class="class-col">4月12日晚接</th>
<th class="class-col">4月11日中午</th>
<th class="class-col">4月12日中午</th>
<th class="oper-col">操作</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>
</div>

<div class="modal" id="imgModal">
<div class="modal-content">
<button class="modal-close" onclick="closeImgModal()">&times;</button>
<img class="modal-img" id="previewImg" src="">
<button class="modal-download" id="downloadBtn">下载图片</button>
</div>
</div>

<div class="modal" id="resultModal">
<div class="modal-content">
<h3 id="modalTitle">操作结果</h3>
<p id="modalMsg"></p>
<button class="modal-btn" onclick="closeModal()">确定</button>
</div>
</div>

<!-- 新增：修改订单弹窗 -->
<div class="modal" id="modifyModal">
  <div class="modal-content" style="max-width: 600px;">
    <h3>修改订单信息</h3>
    <div style="text-align: left; margin: 20px 0;">
      <p style="margin-bottom: 10px; color: #333; font-size: 14px;">
        <strong>订单号：</strong><span id="modifyOrderId"></span>
      </p>
      <p style="margin-bottom: 20px; color: #666; font-size: 13px;">
        注意：修改班次信息后，该行会自动标记为红色
      </p>
      
      <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px; font-weight: bold;">当前班次信息（JSON格式）</label>
        <textarea id="modifyCarList" style="width: 100%; height: 250px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-family: monospace; font-size: 12px; line-height: 1.4;" placeholder="[&#10;  {&#10;    &quot;name&quot;: &quot;4月11日早送&quot;,&#10;    &quot;price&quot;: &quot;20&quot;,&#10;    &quot;school&quot;: &quot;绣水中学&quot;&#10;  }&#10;]"></textarea>
        <p style="font-size: 12px; color: #666; margin-top: 5px;">
          格式：包含name、price、school/from/to字段的JSON数组
        </p>
      </div>
      
      <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 5px; font-weight: bold;">管理密码确认</label>
        <input type="password" id="modifyPassword" placeholder="请输入管理密码" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
      </div>
    </div>
    
    <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
      <button onclick="closeModifyModal()" style="padding: 10px 30px; background: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer;">取消</button>
      <button onclick="submitModifyOrder()" style="padding: 10px 30px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;">确认修改</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>
const SERVER_URL = "https://szzikaocar-server.onrender.com";
let ADMIN_PWD = "";
let originalOrderData = [], mergedOrderData = [], filteredOrderData = [];

// 学校价格配置（与前端的 SCHOOL_PRICE 保持一致）
const SCHOOL_PRICE = {
  '绣水中学': 15,      // 绣水中学价格：15元
  '章丘实验小学': 15,      // 章丘实验小学价格：15元
  '章丘实验中学': 15,      // 章丘实验中学价格：15元
  '章丘第二实验中学': 15,  // 章丘第二实验中学价格：15元
  '章丘鲁能实验小学': 15,  // 章丘鲁能实验小学价格：15元
  '中等职业学校': 15,   // 中等职业学校价格：15元
  '济南六里山小学': 17,   // 济南六里山小学价格：17元
  '济南槐荫中学': 17,   // 济南槐荫中学价格：17元
  '济南育贤中学': 17,   // 济南育贤中学价格：17元
};

// 实时计算总金额工具函数（根据学校动态计算价格）
function calculateRealTotal(carList) {
  let total = 0;
  (carList || []).forEach(item => {
    // 如果item已经有price字段，直接使用
    if (item.price !== undefined && item.price !== null) {
      total += Number(item.price) || 0;
    } else {
      // 否则根据学校计算价格
      if (item.name && item.name.includes('中午考点更换')) {
        // 中午考点更换固定1元
        total += 1;
      } else if (item.school && SCHOOL_PRICE[item.school]) {
        // 早送/晚接根据学校计算价格
        total += SCHOOL_PRICE[item.school];
      } else if (item.from && item.to) {
        // 中午考点更换有两个学校的情况，取较高价格
        const fromPrice = SCHOOL_PRICE[item.from] || 0;
        const toPrice = SCHOOL_PRICE[item.to] || 0;
        total += Math.max(fromPrice, toPrice, 1); // 至少1元
      }
    }
  });
  return total;
}

function showLoading(text = "处理中...") {
  document.getElementById('loading').innerText = text;
  document.getElementById('loading').style.display = 'block';
}
function hideLoading() {
  document.getElementById('loading').style.display = 'none';
}

function login(){
  const val = document.getElementById('pwd').value;
  if(!val){ alert('请输入密码'); return; }
  ADMIN_PWD = val;
  checkLogin();
}

async function checkLogin(){
  showLoading("登录验证中...");
  try {
    const res = await fetch(`${SERVER_URL}/api/getAllOrders`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pwd: ADMIN_PWD })
    });
    const d = await res.json();
    hideLoading();
    if(d.code !== 0){ alert('密码错误'); return; }
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('adminBox').style.display = 'block';
    load();
  }catch(e){ hideLoading(); alert('登录失败：网络异常'); }
}

function logout(){
  if(confirm('确定退出？')){
    ADMIN_PWD = "";
    location.reload();
  }
}

function mergeCarLists(oldList, newList) {
  const carMap = new Map();
  
  // 处理旧订单列表
  oldList.forEach(car => { 
    if (car.name) {
      // 如果老数据没有price字段，根据规则计算
      if (!car.price && car.price !== 0) {
        if (car.name.includes('中午考点更换')) {
          car.price = 1;
        } else if (car.school && SCHOOL_PRICE[car.school]) {
          car.price = SCHOOL_PRICE[car.school];
        } else if (car.from && car.to) {
          // 中午考点更换有两个学校的情况
          const fromPrice = SCHOOL_PRICE[car.from] || 0;
          const toPrice = SCHOOL_PRICE[car.to] || 0;
          car.price = Math.max(fromPrice, toPrice, 1);
        }
      }
      carMap.set(car.name, car); 
    }
  });
  
  // 处理新订单列表
  newList.forEach(car => { 
    if (car.name) {
      // 如果新数据没有price字段，根据规则计算
      if (!car.price && car.price !== 0) {
        if (car.name.includes('中午考点更换')) {
          car.price = 1;
        } else if (car.school && SCHOOL_PRICE[car.school]) {
          car.price = SCHOOL_PRICE[car.school];
        } else if (car.from && car.to) {
          // 中午考点更换有两个学校的情况
          const fromPrice = SCHOOL_PRICE[car.from] || 0;
          const toPrice = SCHOOL_PRICE[car.to] || 0;
          car.price = Math.max(fromPrice, toPrice, 1);
        }
      }
      carMap.set(car.name, car); 
    }
  });
  
  const FIXED_CAR_ORDER = [
    '4月11日早送','4月11日晚接','4月12日早送','4月12日晚接',
    '4月11日中午考点更换','4月12日中午考点更换'
  ];
  return FIXED_CAR_ORDER.filter(n => carMap.has(n)).map(n => carMap.get(n));
}

async function load() {
  if (!ADMIN_PWD) { showModal("提示", "请先登录"); logout(); return; }
  showLoading("加载订单数据中...");
  try {
    const res = await fetch(`${SERVER_URL}/api/getAllOrders`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pwd: ADMIN_PWD })
    });
    const data = await res.json();
    hideLoading();
    if(data.code !==0) { showModal('无权限','请重新登录'); logout(); return; }
    
    // 保存原始订单数据
    originalOrderData = data.data;
    
    // ✅ 修复：使用独立的状态判断逻辑
    const userOrdersMap = new Map();
    
    // 按用户分组
    originalOrderData.forEach(order => {
      const key = `${order.userName || ''}_${order.userPhone || ''}`;
      if (!key) {
        // 单独处理
        if (!userOrdersMap.has(`single_${order._id}`)) {
          userOrdersMap.set(`single_${order._id}`, [order]);
        }
        return;
      }
      
      if (!userOrdersMap.has(key)) {
        userOrdersMap.set(key, [order]);
      } else {
        userOrdersMap.get(key).push(order);
      }
    });
    
    // 合并同一用户的订单
    mergedOrderData = [];
    
    userOrdersMap.forEach((orders, key) => {
      if (orders.length === 1) {
        // 单个订单，直接使用
        mergedOrderData.push({
          ...orders[0],
          _id: orders[0]._id, // 保持原始ID
          isManuallyModified: orders[0].isManuallyModified || false
        });
      } else {
        // 合并多个订单
        const latestOrder = orders.sort((a, b) => 
          new Date(b.createTime) - new Date(a.createTime)
        )[0];
        
        // 合并班次列表
        const mergedCarList = mergeCarLists([], orders.flatMap(o => o.carList || []));
        
        // 计算合并后的实际总金额
        const realTotal = calculateRealTotal(mergedCarList);
        
        // ✅ 修复：检查是否任何一个订单被手动修改过
        const hasManualModification = orders.some(o => o.isManuallyModified);
        
        mergedOrderData.push({
          _id: latestOrder._id, // 使用最新订单的ID
          orderId: orders.map(o => o.orderId).join(','),
          userName: latestOrder.userName,
          userPhone: latestOrder.userPhone,
          payType: latestOrder.payType,
          total: realTotal, // 使用计算后的实际总金额
          carList: mergedCarList,
          createTime: latestOrder.createTime,
          paymentRecords: orders.flatMap(o => o.paymentRecords || []),
          payScreenshots: orders.flatMap(o => o.payScreenshots || []),
          isMultiSubmit: orders.length > 1,
          isManuallyModified: hasManualModification // ✅ 正确判断手动修改状态
        });
      }
    });
    
    filteredOrderData = [...mergedOrderData];
    renderTable();
  } catch (err) { hideLoading(); showModal('错误','加载失败：网络异常'); }
}

function openImage(url) {
  document.getElementById('previewImg').src = url;
  document.getElementById('imgModal').style.display = 'flex';
  document.getElementById('downloadBtn').onclick = () => {
    const a = document.createElement('a');
    a.href = url;
    a.download = `支付截图_${new Date().getTime()}.png`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  };
}
function closeImgModal() { document.getElementById('imgModal').style.display = 'none'; }

function renderTable() {
  const list = document.getElementById('list');
  list.innerHTML = '';
  if(!filteredOrderData.length) { 
    list.innerHTML = '<tr><td colspan="15">暂无数据</td></tr>'; 
    return; 
  }
  
  // 创建一个映射，用于存储每个订单的正确状态
  const orderStatusMap = new Map();
  
  // 先处理原始订单数据，建立状态映射
  originalOrderData.forEach(order => {
    if (order._id) {
      orderStatusMap.set(order._id, {
        isManuallyModified: order.isManuallyModified || false,
        isMultiSubmit: order.isMultiSubmit || false
      });
    }
  });
  
  filteredOrderData.forEach(order => {
    // 确保从映射中获取正确的状态
    const status = orderStatusMap.get(order._id) || {
      isManuallyModified: order.isManuallyModified || false,
      isMultiSubmit: order.isMultiSubmit || false
    };
    
    const tr = document.createElement('tr');
    
    // ✅ 修复：使用正确的状态判断逻辑
    if (status.isManuallyModified) {
      tr.className = 'row-modify';
    } else if (status.isMultiSubmit) {
      tr.className = 'row-multi-submit';
    } else {
      tr.className = 'row-first-submit';
    }
    
    const getClassInfo = (name) => {
      const item = order.carList.find(i => i.name === name);
      if(!item) return '-';
      
      let info = '';
      if (item.school) {
        info = `${item.school} (${item.price || 0}元)`;
      } else if (item.from && item.to) {
        info = `${item.from}→${item.to} (${item.price || 0}元)`;
      } else {
        info = `- (${item.price || 0}元)`;
      }
      return info;
    };
    
    const formatPaymentRecords = () => {
      if(!order.paymentRecords?.length) return '-';
      return order.paymentRecords.map((r, i) => `第${i+1}笔：${r.payType || '未知方式'} ${r.amount || 0}元 ${r.time || '未知时间'}`).join('\n');
    };
    
    const renderScreenshots = () => {
      const arr = order.payScreenshots || [];
      if(!arr.length) return '<span style="color:#999">无截图</span>';
      return `<div class="pay-img-list">${arr.map(u=>`<img src="${u}" class="pay-img-item" onclick="openImage('${u.replace(/'/g, "\\'")}')" alt="截图">`).join('')}</div>`;
    };
    
    tr.innerHTML = `
     <td>${order.orderId || '-'}</td>
     <td>${order.userName || '-'}</td>
     <td>${order.userPhone || '-'}</td>
     <td>${order.payType || '-'}</td>
     <td class="pay-record">${formatPaymentRecords()}</td>
     <td>${renderScreenshots()}</td>
     <td>${order.total || 0}元</td>
     <td>${order.createTime || '-'}</td>
     <td>${getClassInfo('4月11日早送')}</td>
     <td>${getClassInfo('4月11日晚接')}</td>
     <td>${getClassInfo('4月12日早送')}</td>
     <td>${getClassInfo('4月12日晚接')}</td>
     <td>${getClassInfo('4月11日中午考点更换')}</td>
     <td>${getClassInfo('4月12日中午考点更换')}</td>
     <td>
       <button class="refresh-amount-btn" onclick="refreshAmount('${order.orderId}')">刷新金额</button>
       <button class="modify-btn" onclick="openModifyModal('${order._id}', '${order.orderId}')">修改</button>
       <button class="del-btn" onclick="deleteOrder('${order._id}')">删除</button>
     </td>
   `;
    list.appendChild(tr);
  });
}

// 打开修改订单弹窗
function openModifyModal(id, orderId) {
  // 找到对应的订单数据
  const originalOrder = originalOrderData.find(order => order._id === id);
  if (!originalOrder) {
    showModal('错误', '找不到订单数据');
    return;
  }
  
  // 填充数据
  document.getElementById('modifyOrderId').innerText = orderId;
  document.getElementById('modifyCarList').value = JSON.stringify(originalOrder.carList || [], null, 2);
  document.getElementById('modifyPassword').value = '';
  
  // 显示弹窗
  document.getElementById('modifyModal').style.display = 'flex';
}

// 关闭修改弹窗
function closeModifyModal() {
  document.getElementById('modifyModal').style.display = 'none';
}

// 提交修改
async function submitModifyOrder() {
  const orderId = document.getElementById('modifyOrderId').innerText;
  const carListStr = document.getElementById('modifyCarList').value;
  const password = document.getElementById('modifyPassword').value;
  
  if (!password) {
    showModal('提示', '请输入管理密码');
    return;
  }
  
  // 验证JSON格式
  let carList;
  try {
    carList = JSON.parse(carListStr);
    if (!Array.isArray(carList)) {
      throw new Error('必须是数组格式');
    }
    
    // 验证每个班次的价格是否正确
    carList.forEach((item, index) => {
      if (!item.price && item.price !== 0) {
        // 如果没有price字段，根据学校计算
        if (item.name && item.name.includes('中午考点更换')) {
          item.price = 1;
        } else if (item.school && SCHOOL_PRICE[item.school]) {
          item.price = SCHOOL_PRICE[item.school];
        } else if (item.from && item.to) {
          const fromPrice = SCHOOL_PRICE[item.from] || 0;
          const toPrice = SCHOOL_PRICE[item.to] || 0;
          item.price = Math.max(fromPrice, toPrice, 1);
        }
      }
    });
  } catch (e) {
    showModal('格式错误', '请检查JSON格式是否正确: ' + e.message);
    return;
  }
  
  showLoading("正在修改...");
  try {
    const response = await fetch(`${SERVER_URL}/api/updateOrder`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pwd: password,
        orderId: orderId,
        updates: {
          carList: carList
        }
      })
    });
    
    const data = await response.json();
    hideLoading();
    
    if (data.code === 0) {
      showModal('修改成功', '订单修改完成，该行将自动标记为红色');
      closeModifyModal();
      load(); // 重新加载数据
    } else {
      showModal('修改失败', data.msg || '未知错误');
    }
  } catch (error) {
    hideLoading();
    showModal('网络错误', '修改失败，请检查网络连接');
  }
}

async function refreshAmount(orderId) {
  if(!confirm('确定刷新金额？')) return;
  showLoading("刷新中...");
  try {
    const r = await fetch(`${SERVER_URL}/api/recalculateAmount`,{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ pwd:ADMIN_PWD, orderId })
    });
    const d = await r.json();
    hideLoading();showModal('结果',d.msg);if(d.code===0) load();
  }catch(e){ hideLoading();showModal('错误','刷新失败'); }
}

async function deleteOrder(id) {
  if(!confirm('确定删除？')) return;
  showLoading("删除中...");
  try {
    const r = await fetch(`${SERVER_URL}/api/deleteOrder`,{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ pwd:ADMIN_PWD, id })
    });
    const d = await r.json();
    hideLoading();showModal('结果',d.msg);if(d.code===0) load();
  }catch(e){ hideLoading();showModal('错误','删除失败'); }
}

function searchOrders() {
  const name = document.getElementById('searchName').value.trim().toLowerCase();
  const phone = document.getElementById('searchPhone').value.trim();
  filteredOrderData = mergedOrderData.filter(o=>{
    return (o.userName || '').toLowerCase().includes(name) && (o.userPhone || '').includes(phone);
  });
  renderTable();
}
function resetSearch() {
  document.getElementById('searchName').value = '';
  document.getElementById('searchPhone').value = '';
  filteredOrderData = [...mergedOrderData];
  renderTable();
}

function exportExcel() {
  if(!filteredOrderData.length) { showModal('提示','暂无数据'); return; }
  showLoading("生成Excel中...");
  try {
    const excelData = filteredOrderData.map(o => {
      // ✅ 修复：正确获取订单的原始数据来判断状态
      const originalOrders = originalOrderData.filter(
        orig => orig.userName === o.userName && orig.userPhone === o.userPhone
      );
      
      let orderStatus = "首次提交";
      if (originalOrders.some(orig => orig.isManuallyModified)) {
        orderStatus = "手动修改";
      } else if (o.isMultiSubmit) {
        orderStatus = "多次提交";
      }
      
      // 计算实际总金额
      const realTotal = calculateRealTotal(o.carList);
      
      const getInfo = (n) => {
        const i = o.carList.find(x => x.name === n);
        if (!i) return '-';
        let info = '';
        if (i.school) {
          info = `${i.school} (${i.price || 0}元)`;
        } else if (i.from && i.to) {
          info = `${i.from}→${i.to} (${i.price || 0}元)`;
        } else {
          info = `- (${i.price || 0}元)`;
        }
        return info;
      };
      
      const payRecords = o.paymentRecords?.length ? o.paymentRecords.map((r,i)=>`第${i+1}笔：${r.payType} ${r.amount}元 ${r.time}`).join('\n') : '-';
      
      return {
        '订单ID': o.orderId, 
        '姓名': o.userName, 
        '电话': o.userPhone, 
        '支付方式': o.payType,
        '支付记录': payRecords, 
        '总金额': `${realTotal}元`, 
        '提交时间': o.createTime,
        '4月11日早送': getInfo('4月11日早送'), 
        '4月11日晚接': getInfo('4月11日晚接'),
        '4月12日早送': getInfo('4月12日早送'), 
        '4月12日晚接': getInfo('4月12日晚接'),
        '4月11日中午': getInfo('4月11日中午考点更换'), 
        '4月12日中午': getInfo('4月12日中午考点更换'),
        '订单状态': orderStatus
      };
    });
    
    const ws = XLSX.utils.json_to_sheet(excelData);
    const range = XLSX.utils.decode_range(ws['!ref']);
    const wrapStyle = { alignment: { wrapText: true, vertical: 'top', horizontal: 'left' } };
    for (let r = range.s.r; r <= range.e.r; r++) {
      for (let c = range.s.c; c <= range.e.c; c++) {
        const cell = XLSX.utils.encode_cell({r,c});
        if(ws[cell]) ws[cell].s = wrapStyle;
      }
    }
    ws['!cols'] = [
      {wch:15},{wch:10},{wch:15},{wch:12},{wch:30},{wch:10},{wch:20},
      {wch:18},{wch:18},{wch:18},{wch:18},{wch:18},{wch:18},{wch:12}
    ];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '订单数据');
    XLSX.writeFile(wb, `山青院订单_${new Date().toLocaleString()}.xlsx`);
    hideLoading();showModal('成功','导出完成！');
  } catch (e) { hideLoading();showModal('错误','导出失败'); }
}

function showModal(t,m){
  document.getElementById('modalTitle').innerText = t;
  document.getElementById('modalMsg').innerText = m;
  document.getElementById('resultModal').style.display = 'flex';
}
function closeModal(){ document.getElementById('resultModal').style.display = 'none'; }
